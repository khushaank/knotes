  <style>
    *,
    ::before,
    ::after {
      box-sizing: border-box
    }

    body {
      margin: 0;
      background: #f6f6ef;
      color: #261812;
      font: 12px/16px Verdana, Geneva, sans-serif
    }

    a {
      color: inherit;
      text-decoration: none
    }

    a:hover {
      text-decoration: underline
    }

    button,
    input {
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit
    }

    .hidden {
      display: none !important
    }

    .flex {
      display: flex
    }

    .flex-col {
      flex-direction: column
    }

    .flex-wrap {
      flex-wrap: wrap
    }

    .items-center {
      align-items: center
    }

    .justify-center {
      justify-content: center
    }

    .ml-auto {
      margin-left: auto
    }

    .mx-auto {
      margin-right: auto;
      margin-left: auto
    }

    .w-full {
      width: 100%
    }

    .gap-1 {
      gap: 4px
    }

    .gap-2 {
      gap: 8px
    }

    .text-right {
      text-align: right
    }

    .text-center {
      text-align: center
    }

    .align-top {
      vertical-align: top
    }

    .font-bold {
      font-weight: 700
    }

    .w-4 {
      width: 16px
    }

    .w-5 {
      width: 20px
    }

    .pr-1 {
      padding-right: 4px
    }

    .pt-\[2px\] {
      padding-top: 2px
    }

    .h-\[2px\] {
      height: 2px
    }

    body>div:first-of-type {
      max-width: 85%;
      margin: 8px auto 0;
      background: #f6f6ef;
      padding-bottom: 32px
    }

    header {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 2px 8px;
      background: #f60;
      color: #000;
      font-size: 14px
    }

    header>div {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 4px
    }

    header a:first-child {
      margin-right: 8px;
      padding: 0 4px;
      font-weight: 700
    }

    #broadcast-banner {
      padding: 8px 16px;
      border-bottom: 1px solid #fde68a;
      background: #fff9c4;
      color: #713f12;
      text-align: center;
      font-size: 12px
    }

    #feed-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      border-bottom: 1px solid #d1d5db;
      background: #f6f6ef;
      color: #4b5563;
      font-size: 12px
    }

    main {
      min-height: 100vh;
      padding: 8px 8px 16px;
      background: #f6f6ef
    }

    main table {
      border-collapse: collapse
    }

    .story-title {
      color: #000;
      font-size: 10pt;
      line-height: 1.2
    }

    .story-meta {
      padding-top: 1px;
      color: #5f5f5f;
      font-size: 7pt
    }

    .story-meta a,
    .domain-text,
    .domain-text a,
    .text-hn-grey {
      color: #5f5f5f
    }

    .domain-text {
      font-size: 8pt
    }

    .knotes-upvote-triangle {
      display: inline-block;
      width: 0;
      height: 0;
      border-right: 4px solid transparent;
      border-bottom: 7px solid #828282;
      border-left: 4px solid transparent;
      vertical-align: middle
    }

    .knotes-dropdown {
      position: relative;
      display: inline-block
    }

    .knotes-dropdown-trigger {
      padding: 0 2px;
      color: #5f5f5f;
      cursor: pointer
    }

    .knotes-dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 1000;
      min-width: 140px;
      margin-top: 6px;
      padding: 6px 0;
      border: 1px solid #d1d1d1;
      border-radius: 6px;
      background: #fff
    }

    .dropdown-item {
      padding: 6px 12px;
      color: #333;
      white-space: nowrap;
      cursor: pointer
    }

    footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 100%;
      margin-top: 16px;
      padding: 32px 16px;
      border-top: 2px solid #f60;
      background: #f6f6ef;
      color: #4b5563;
      font-size: 12px
    }

    footer input {
      width: 192px;
      padding: 2px 8px;
      border: 1px solid #9ca3af;
      background: #fff;
      color: #000
    }

    html.dark body,
    html.dark body>div:first-of-type,
    html.dark main,
    html.dark #feed-controls,
    html.dark footer {
      background: #1c1917;
      color: #e5e7eb
    }

    html.dark .story-title {
      color: #f3f4f6
    }

    html.dark .story-meta,
    html.dark .story-meta a,
    html.dark .domain-text,
    html.dark .domain-text a,
    html.dark .text-hn-grey {
      color: #9ca3af
    }

    @media(max-width:639px) {
      body>div:first-of-type {
        max-width: 100%;
        margin: 4px 0 0
      }

      .kn-theme-separator {
        display: none
      }

      .kn-theme-toggle {
        position: absolute;
        top: 6px;
        right: 8px
      }

      #feed-controls {
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        padding: 8px
      }

      main {
        padding-right: 6px;
        padding-left: 6px
      }

      main table {
        width: 100%
      }

      .story-title {
        line-height: 1.35
      }

      .story-meta {
        line-height: 1.5
      }

      footer input {
        max-width: 240px;
        width: 100%
      }
    }
  </style>

</head>

<body class="font-body-md text-body-md text-on-surface">
  <div class="max-w-[85%] mx-auto bg-surface-bright pb-8 mt-2">

        <a class="hover:underline text-gray-600" href="lists">Lists</a> | <a class="hover:underline text-gray-600"
          href="security">Security</a> |
        <a class="hover:underline text-gray-600" href="legal">Legal</a> | <a class="hover:underline text-gray-600"
          href="contact">Feedback</a>
      </div>
      <form id="footer-search-form" class="flex items-center gap-2"

        <span class="text-gray-500 text-xs">Search:</span>
