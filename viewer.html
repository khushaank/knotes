<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>KN - Story Viewer</title>
        <link href="css/styles.css" rel="stylesheet" />
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <script src="js/tailwindConfig.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                rel="stylesheet" />
</head>

<body class="bg-background text-on-background min-h-screen">
        <div class="max-w-[85%] mx-auto bg-surface-container-lowest mt-edge-margin mb-edge-margin">
                <!-- Header -->
                <header class="bg-[#ff6600] w-full rounded-none">
                        <div class="flex items-center justify-between px-2 py-1 mx-auto">
                                <div
                                        class="flex items-center gap-1 font-['Work_Sans'] text-sm font-medium tracking-tight">
                                        <span class="font-bold text-black px-2 border border-black leading-none bg-transparent select-none flex items-center justify-center w-[18px] h-[18px]">KN</span>
                                        <nav class="flex items-center divide-x divide-black/20 text-black">
                                                <a class="px-1 text-black font-bold" href="index.html">Hacker News</a>
                                                <a class="px-1 text-black hover:underline" href="#">new</a>
                                                <a class="px-1 text-black hover:underline" href="#">past</a>
                                                <a class="px-1 text-black hover:underline" href="#">comments</a>
                                                <a class="px-1 text-black hover:underline" href="#">ask</a>
                                                <a class="px-1 text-black hover:underline" href="#">show</a>
                                                <a class="px-1 text-black hover:underline" href="#">jobs</a>
                                                <a class="px-1 text-black hover:underline" href="#">submit</a>
                                        </nav>
                                </div>
                                <div
                                        class="font-['Work_Sans'] text-sm font-medium tracking-tight text-black hover:underline cursor-pointer">
                                        By Khushaank Gupta
                                </div>
                        </div>
                </header>
                <!-- Main Content -->
                <main class="bg-surface-container-lowest p-2">
                        <!-- Story Header -->
                        <article class="mb-4">
                                <div class="p-4">Loading story...</div>
                        </article>

                        <!-- Comment Input -->
                        <div class="ml-[17px] mb-8">
                                <textarea
                                        class="w-full max-w-lg h-24 border border-outline bg-surface p-1 font-body-md text-body-md focus:outline-none focus:border-primary-container resize-y"
                                        id="comment-input" placeholder=""></textarea>
                                <button class="mt-2 bg-secondary-container border border-outline px-2 py-1 font-body-md text-body-md hover:bg-surface-variant text-on-background cursor-pointer"
                                        id="add-comment-btn">add comment</button>
                        </div>

                        <!-- Comments Tree -->
                        <div class="ml-[17px] font-body-md text-body-md" id="comments-container">
                                <div class="p-4">Loading comments...</div>
                        </div>
                </main>
                <!-- Footer -->
                <footer class="bg-[#f6f6ef] dark:bg-stone-900 border-t-2 border-[#ff6600] mt-4 rounded-none">
                        <div class="flex flex-col items-center gap-2 py-8 w-full mx-auto">
                                <nav class="flex items-center justify-center flex-wrap divide-x divide-gray-400 font-['Work_Sans'] text-xs text-gray-600">
                    <a class="px-2 text-gray-600 hover:underline" href="guidelines.html">Guidelines</a>
                    <a class="px-2 text-gray-600 hover:underline" href="faq.html">FAQ</a>
                    <a class="px-2 text-gray-600 hover:underline" href="lists.html">Lists</a>
                    <a class="px-2 text-gray-600 hover:underline" href="api.html">API</a>
                    <a class="px-2 text-gray-600 hover:underline" href="security.html">Security</a>
                    <a class="px-2 text-gray-600 hover:underline" href="legal.html">Legal</a>
                    <a class="px-2 text-gray-600 hover:underline" href="contact.html">Contact</a>
                </nav>
                                <div class="text-[10px] text-gray-500 font-normal">
                                        By Khushaank Gupta
                                </div>
                                <div class="mt-2 w-full max-w-sm flex justify-center">
                                        <div class="border border-gray-400 bg-white flex w-full max-w-[200px]">
                                                <input aria-label="Search"
                                                        class="w-full border-none focus:ring-0 text-xs p-1 h-5 text-black"
                                                        type="text" />
                                        </div>
                                </div>
                        </div>
                </footer>
        </div>
        <script type="module" src="js/viewer.js"></script>
</body>

</html>
