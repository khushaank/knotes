<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('kn-theme') || 'light';
                if (theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                    document.documentElement.classList.remove('dark');
                }
            } catch (e) { }
        })();
    </script>

<body class="viewer-page font-body-md text-body-md text-on-surface min-h-screen">
    <div class="max-w-[85%] mx-auto bg-surface-bright pb-8 mt-2">
        <header

            </div>

            <div class="ml-[17px] font-body-md text-body-md" id="comments-container"></div>
            <div class="flex flex-col items-center mt-8 pb-4"></div>

        <footer

                    class="border border-gray-400 px-2 py-0.5 text-xs rounded-sm focus:outline-none focus:border-[#ff6600] text-black w-48">
