<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co;" />
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Profile - K. Notes</title>
    <link href="assets/css/styles.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/img/logo.png" />
</head>

<body class="font-body-md text-body-md text-on-surface">
    <div class="max-w-[85%] mx-auto bg-surface-bright pb-8 mt-2">
        <header
            class="bg-[#ff6600] text-black  text-sm  rounded-none w-full flat no shadows flex items-center justify-between px-2 py-0.5 max-w-[85%] mx-auto"
            style="max-width: 100%;">
            <div class="flex items-center gap-1 w-full">
                <a href="index.html" class="font-bold text-black px-1 mr-2 hover:underline">K. Notes</a>
                <div class="flex flex-wrap items-center gap-1 text-black text-[13px]">
                    <a class="hover:underline" href="index.html">new</a> |
                    <a class="hover:underline" href="comments.html">comments</a> |
                    <a class="hover:underline" href="ask.html">ask</a> |
                    <a class="hover:underline" href="show.html">show</a> |
                    <a class="hover:underline" href="submit.html">submit</a>
                </div>
                <div class="ml-auto text-black text-[13px] flex items-center gap-4">
                    <a class="hover:underline text-black" href="login.html">login</a>
                </div>
            </div>
        </header>
        <main class="bg-[#f6f6ef] p-4 min-h-[50vh]">
            <div id="profile-container" class="hidden">
                <table class="border-spacing-0 border-collapse text-sm text-gray-700">
                    <tbody>
                        <tr>
                            <td class="py-1 pr-4 align-top font-bold text-gray-500">user:</td>
                            <td class="py-1" id="profile-username"></td>
                        </tr>
                        <tr>
                            <td class="py-1 pr-4 align-top font-bold text-gray-500">created:</td>
                            <td class="py-1" id="profile-created"></td>
                        </tr>
                        <tr>
                            <td class="py-1 pr-4 align-top font-bold text-gray-500">karma:</td>
                            <td class="py-1" id="profile-karma">0</td>
                        </tr>
                        <tr>
                            <td class="py-1 pr-4 align-top font-bold text-gray-500">about:</td>
                            <td class="py-1">
                                <textarea id="profile-about" class="border border-gray-400 p-1 text-sm w-96 h-24 focus:outline-none focus:border-[#ff6600]"></textarea>
                            </td>
                        </tr>
                        <tr>
                            <td></td>
                            <td class="py-2"><button type="button" id="btn-update-profile" class="bg-gray-200 border border-gray-400 px-2 py-0.5 hover:bg-gray-300 text-black cursor-pointer">update</button></td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="mt-6 border-t border-gray-300 pt-4">
                    <h3 class="font-bold text-gray-800 mb-2">Submissions</h3>
                    <div id="profile-submissions" class="text-sm">
                        Loading...
                    </div>
                </div>
            </div>
            
            <div id="auth-message" class="text-sm p-4 hidden">
                Please <a href="login.html" class="underline font-bold">login</a> to view your profile.
            </div>
        </main>
        <footer
            class="bg-[#f6f6ef] dark:bg-stone-900 text-[#ff6600]  text-xs text-gray-600 rounded-none border-t-2 border-[#ff6600] mt-4 flat no shadows flex flex-col items-center gap-2 py-8 w-full max-w-[85%] mx-auto"
            style="max-width: 100%;">
            <div class="flex justify-center w-full mb-2">
                <span class="text-[10px] text-gray-500 font-normal">By Khushaank Gupta</span>
            </div>
            <div class="flex flex-wrap justify-center gap-2 text-gray-600 mb-4">
                <a class="hover:underline text-gray-600" href="guidelines.html">Guidelines</a> |
                <a class="hover:underline text-gray-600" href="faq.html">FAQ</a> |
                <a class="hover:underline text-gray-600" href="lists.html">Lists</a> |
                <a class="hover:underline text-gray-600" href="api.html">API</a> |
                <a class="hover:underline text-gray-600" href="security.html">Security</a> |
                <a class="hover:underline text-gray-600" href="legal.html">Legal</a> |
                <a class="hover:underline text-gray-600" href="contact.html">Contact</a>
            </div>
            <form id="footer-search-form" class="flex items-center gap-2"
                onsubmit="event.preventDefault(); window.location.href='index.html?search='+document.getElementById('footer-search-input').value;">
                <span class="text-gray-500 text-xs">Search:</span>
                <input type="text" id="footer-search-input"
                    class="border border-gray-400 px-2 py-0.5 text-xs rounded-sm focus:outline-none focus:border-[#ff6600] text-black w-48">
            </form>
        </footer>
    </div>
    <script type="module" src="assets/js/profile.js"></script>
    <script type="module" src="assets/js/session.js"></script>
</body>

</html>
