    <style>
        #subs-main-content {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #subs-main-content.ready {
            visibility: visible;
            opacity: 1;
        }

        #subs-loading {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            background: white;
            border: 1px solid #eee;
            border-radius: 4px;
        }

        .skel-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .skel-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #eee;
            flex-shrink: 0;
        }

        .skel-line {
            height: 12px;
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 2px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .sub-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.12s;
        }

        .sub-card:last-child {
            border-bottom: none;
        }

        .sub-card:hover {
            background: #fafafa;
        }

        .sub-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: #555;
            text-transform: uppercase;
        }

        .sub-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sub-info {
            flex: 1;
            min-width: 0;
        }

        .sub-name {
            font-weight: 600;
            font-size: 14px;
            color: #000;
        }

        .sub-name:hover {
            text-decoration: underline;
        }

        .sub-bio {
            font-size: 12px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .sub-meta {
            font-size: 11px;
            color: #aaa;
            margin-top: 3px;
        }

        .sub-unfollow-btn {
            font-size: 11px;
            padding: 5px 14px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: #fff;
            color: #333;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
            font-weight: 500;
        }

        .sub-unfollow-btn:hover {
            border-color: #ff6600;
            color: #ff6600;
            background: #fff8f0;
        }

        .sub-unfollow-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .subs-tab {
            padding: 6px 16px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid transparent;
            text-decoration: none;
        }

        .subs-tab.active {
            background: #ff6600;
            color: #fff;
            font-weight: 600;
        }

        .subs-tab:not(.active) {
            color: #666;
            border-color: #ddd;
        }

        .subs-tab:not(.active):hover {
            background: #fff8f0;
            border-color: #ff6600;
            color: #ff6600;
        }

        .subs-empty {
            text-align: center;
            padding: 48px 24px;
            color: #999;
        }

        .subs-empty .material-symbols-outlined {
            font-size: 48px;
            color: #ddd;
            display: block;
            margin: 0 auto 12px;
        }

        .subs-empty p {
            font-size: 14px;
            margin-bottom: 16px;
        }

        .subs-empty a {
            color: #ff6600;
            font-weight: 600;
            text-decoration: none;
        }

        .subs-empty a:hover {
            text-decoration: underline;
        }

        .subs-count {
            font-size: 11px;
            color: #aaa;
            font-weight: normal;
            margin-left: 4px;
        }
    </style>
</head>
