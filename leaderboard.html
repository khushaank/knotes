<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net;" />
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Leaderboard - K. Notes</title>
    <link href="assets/css/styles.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/img/logo.png" />
    <style>
        .leader-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            transition: background 0.15s;
        }

        .leader-row:hover {
            background: #fff8f0;
        }

        .leader-rank {
            width: 28px;
            text-align: right;
            font-weight: bold;
            color: #828282;
            font-size: 13px;
            flex-shrink: 0;
        }

        .leader-rank.gold {
            color: #f59e0b;
        }

        .leader-rank.silver {
            color: #9ca3af;
        }

        .leader-rank.bronze {
            color: #b45309;
        }

        .leader-avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: #555;
            text-transform: uppercase;
            flex-shrink: 0;
            overflow: hidden;
        }

        .leader-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .leader-info {
            flex: 1;
            min-width: 0;
        }

        .leader-name {
            font-weight: bold;
            font-size: 13px;
            color: #000;
        }

        .leader-name:hover {
            text-decoration: underline;
        }

        .leader-joined {
            font-size: 10px;
            color: #828282;
        }

        .leader-karma {
            font-size: 14px;
            font-weight: bold;
            color: #ff6600;
            text-align: right;
            flex-shrink: 0;
            min-width: 50px;
        }

        .leader-karma-label {
            font-size: 9px;
            color: #828282;
            font-weight: normal;
            display: block;
        }
    </style>
</head>

<body class="font-body-md text-body-md text-on-surface">
    <div class="max-w-[85%] mx-auto bg-surface-bright pb-8 mt-2">
        <header
            class="bg-[#ff6600] text-black  text-sm  rounded-none w-full flat no shadows flex items-center justify-between px-2 py-0.5 max-w-[85%] mx-auto"
            style="max-width: 100%;">
            <div class="flex items-center gap-1 w-full">
                <a href="index.html" class="font-bold text-black px-1 mr-2 hover:underline">K. Notes</a>
                <div class="flex flex-wrap items-center gap-1 text-black text-[13px]">
                    <a class="hover:underline" href="index.html">new</a> |
                    <a class="hover:underline" href="comments.html">comments</a> |
                    <a class="hover:underline" href="ask.html">ask</a> |
                    <a class="hover:underline" href="show.html">show</a> |
                    <a class="hover:underline" href="submit.html">submit</a> |
                    <a class="hover:underline font-bold" href="leaderboard.html">leaders</a>
                </div>
                <div class="ml-auto text-black text-[13px] flex items-center gap-4"> <a href="search.html"
                        title="Search" class="hover:text-gray-700 flex items-center"><span
                            class="material-symbols-outlined" style="font-size:16px;">search</span></a> <a
                        class="hover:underline text-black" href="login.html">login</a> </div>
            </div>
        </header>
        <main class="bg-[#f6f6ef] p-6 min-h-[50vh]">
            <div class="flex items-center justify-between mb-4">
                <b class="text-black text-lg">Leaderboard</b>
                <span class="text-xs text-gray-500">Top users by karma</span>
            </div>

            <div id="leaderboard-container" class="bg-white rounded border border-gray-200">
                <div class="p-6 text-center text-gray-500 text-sm">Loading leaderboard...</div>
            </div>
        </main>
        <footer
            class="bg-[#f6f6ef] dark:bg-stone-900 text-[#ff6600]  text-xs text-gray-600 rounded-none border-t-2 border-[#ff6600] mt-4 flat no shadows flex flex-col items-center gap-2 py-8 w-full max-w-[85%] mx-auto"
            style="max-width: 100%;">
            <div class="flex justify-center w-full mb-2">
                <span class="text-[10px] text-gray-500 font-normal">By Khushaank Gupta</span>
            </div>
            <div class="flex flex-wrap justify-center gap-2 text-gray-600 mb-4">
                <a class="hover:underline text-gray-600" href="guidelines.html">Guidelines</a> |
                <a class="hover:underline text-gray-600" href="faq.html">FAQ</a> |
                <a class="hover:underline text-gray-600" href="lists.html">Lists</a> |
                <a class="hover:underline text-gray-600" href="api.html">API</a> |
                <a class="hover:underline text-gray-600" href="security.html">Security</a> |
                <a class="hover:underline text-gray-600" href="legal.html">Legal</a> |
                <a class="hover:underline text-gray-600" href="contact.html">Contact</a>
            </div>
            <form id="footer-search-form" class="flex items-center gap-2"
                onsubmit="event.preventDefault(); window.location.href='search.html?search='+document.getElementById('footer-search-input').value;">
                <span class="text-gray-500 text-xs">Search:</span>
                <input type="text" id="footer-search-input"
                    class="border border-gray-400 px-2 py-0.5 text-xs rounded-sm focus:outline-none focus:border-[#ff6600] text-black w-48">
            </form>
        </footer>
    </div>
    <script type="module" src="assets/js/leaderboard.js"></script>
    <script type="module" src="assets/js/session.js"></script>
</body>

</html>
