    <style>
        #leaderboard-main-content {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #leaderboard-main-content.ready {
            visibility: visible;
            opacity: 1;
        }


        #leaderboard-loading {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            background: white;
            border: 1px solid #eee;
            border-radius: 4px;
        }

        .skel-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .skel-circle {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            background: #eee;
        }

        .skel-line {
            height: 12px;
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 2px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .leader-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            transition: background 0.15s;
        }

        .leader-row:hover {
            background: #fff8f0;
        }

        .leader-row:last-child {
            border-bottom: none;
        }

        .leader-rank {
            width: 28px;
            text-align: right;
            font-weight: bold;
            color: #828282;
            font-size: 13px;
            flex-shrink: 0;
        }

        .leader-rank.gold {
            color: #f59e0b;
        }

        .leader-rank.silver {
            color: #9ca3af;
        }

        .leader-rank.bronze {
            color: #b45309;
        }

        .leader-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: #555;
            text-transform: uppercase;
            flex-shrink: 0;
            overflow: hidden;
        }

        .leader-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .leader-info {
            flex: 1;
            min-width: 0;
        }

        .leader-name {
            font-weight: bold;
            font-size: 13px;
            color: #000;
        }

        .leader-name:hover {
            text-decoration: underline;
        }

        .leader-karma {
            font-size: 14px;
            font-weight: bold;
            color: #ff6600;
            text-align: right;
            flex-shrink: 0;
            min-width: 50px;
        }

        .leader-karma-label {
            font-size: 9px;
            color: #828282;
            font-weight: normal;
            display: block;
        }

        .boost-karma-btn {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 2px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .boost-karma-btn:hover:not(:disabled) {
            border-color: #ff6600;
            background: #fff8f0;
        }


        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .search-wrapper input {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px 12px 8px 36px;
            font-size: 13px;
            background: #fafafa;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .search-wrapper input:focus {
            border-color: #ff6600;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.08);
        }

        .search-wrapper .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 18px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .search-wrapper input:focus~.search-icon,
        .search-wrapper input:not(:placeholder-shown)~.search-icon {
            color: #ff6600;
        }

        .search-wrapper .search-clear {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            display: none;
            transition: color 0.15s;
        }

        .search-wrapper .search-clear:hover {
            color: #333;
        }


        #search-results-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            max-height: 360px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        #search-results-dropdown.active {
            display: block;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            cursor: pointer;
            transition: background 0.12s;
            text-decoration: none;
            color: inherit;
        }

        .search-result-item:hover {
            background: #fafafa;
        }

        .search-result-item .sr-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: #555;
            text-transform: uppercase;
            overflow: hidden;
        }

        .search-result-item .sr-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .search-result-item .sr-info {
            flex: 1;
            min-width: 0;
        }

        .search-result-item .sr-name {
            font-weight: 600;
            font-size: 13px;
            color: #000;
        }

        .search-result-item .sr-bio {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-no-results {
            padding: 24px 14px;
            text-align: center;
            color: #999;
            font-size: 13px;
        }

        .search-no-results .material-symbols-outlined {
            font-size: 32px;
            display: block;
            margin: 0 auto 6px;
            color: #ddd;
        }

        .search-loading {
            padding: 18px 14px;
            text-align: center;
            color: #aaa;
            font-size: 12px;
        }

        #search-results-dropdown .sr-section-label {
            font-size: 10px;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 14px 4px;
        }
    </style>
</head>
